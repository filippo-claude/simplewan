# Builds the packages with the OpenWrt SDK, assembles a signed opkg feed, and
# publishes it to GitHub Pages.
#
# NOTE: this workflow has not yet been run end-to-end. The SDK toolchain
# filename and a few paths may need adjusting for your exact OpenWrt release.
# `scripts/build-feed.sh` does the same steps locally if you want to debug the
# build outside CI.
#
# Requires a repository secret USIGN_SECRET containing the usign secret key
# whose public half is feed/simplewan-feed.pub.
name: feed

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: OpenWrt release to build the SDK against
        default: '24.10.0'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '24.10.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk \
            git gettext libssl-dev xsltproc wget unzip python3 zstd file rsync

      - name: Download and extract the OpenWrt SDK
        run: |
          set -eux
          BASE="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/mvebu/cortexa9"
          SDK="$(curl -fsSL "$BASE/" | grep -oE 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n1)"
          wget -q "$BASE/$SDK"
          case "$SDK" in
            *.zst) tar --use-compress-program=unzstd -xf "$SDK" ;;
            *)     tar xf "$SDK" ;;
          esac
          echo "SDK_DIR=$PWD/$(echo "$SDK" | sed -E 's/\.tar\.(xz|zst)$//')" >> "$GITHUB_ENV"

      - name: Build packages
        run: |
          set -eux
          cp -r "$GITHUB_WORKSPACE/openwrt/simplewan" "$SDK_DIR/package/simplewan"
          cp -r "$GITHUB_WORKSPACE/luci-app-simplewan" "$SDK_DIR/package/luci-app-simplewan"
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install golang luci-base
          sed -i "s/^PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=${GITHUB_SHA}/" package/simplewan/Makefile
          make defconfig
          make package/simplewan/compile V=s
          make package/luci-app-simplewan/compile V=s

      - name: Assemble feed
        run: |
          set -eux
          OUT="$GITHUB_WORKSPACE/public"
          mkdir -p "$OUT"
          # Publish only our packages; dependencies come from the official feeds.
          for p in simplewan luci-app-simplewan; do
            find "$SDK_DIR/bin/packages" -name "${p}_*.ipk" -exec cp {} "$OUT/" \;
          done
          # ipkg-make-index.sh hashes packages via $MKHASH (set by make, not here).
          export MKHASH="$SDK_DIR/staging_dir/host/bin/mkhash"
          ( cd "$OUT" && "$SDK_DIR/scripts/ipkg-make-index.sh" . > Packages && gzip -fk Packages )
          cp "$GITHUB_WORKSPACE/feed/simplewan-feed.pub" "$OUT/"

      - name: Sign index
        run: |
          set -eux
          git clone --depth 1 https://git.openwrt.org/project/usign.git /tmp/usign
          cc -o /tmp/usign/usign /tmp/usign/main.c /tmp/usign/edsign.c /tmp/usign/ed25519.c \
            /tmp/usign/f25519.c /tmp/usign/fprime.c /tmp/usign/sha512.c /tmp/usign/base64.c
          printf '%s' "${USIGN_SECRET}" > /tmp/feed.sec
          /tmp/usign/usign -S -m "$GITHUB_WORKSPACE/public/Packages" -s /tmp/feed.sec \
            -x "$GITHUB_WORKSPACE/public/Packages.sig"
          rm -f /tmp/feed.sec
        env:
          USIGN_SECRET: ${{ secrets.USIGN_SECRET }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
